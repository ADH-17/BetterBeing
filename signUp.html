<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link rel="stylesheet" href="signUp.css" />
</head>
<body>

  <!-- Back button -->
  <div class="back-btn">&#8592;</div>

  <!-- Title -->
  <h1 class="title">Create Your Account</h1>

  <!-- Form Card -->
  <div class="card">
    <form>

      <div class="form-row">
        <label>Name:</label>
        <input type="text" />
      </div>

      <div class="form-row">
        <label>Email:</label>
        <input type="email" />
      </div>

      <div class="form-row">
        <label>Password:</label>
        <input type="password" />
        <span class="help">?</span>
      </div>

      <div class="form-row">
        <label>Re-type password:</label>
        <input type="password" />
      </div>

      <div class="terms">
        <input type="checkbox" />
        <p>
          I agree to the <span>Terms of Use</span> and <span>Privacy Policy</span>.
        </p>
      </div>

      <button type="submit" class="btn">Sign up</button>

    </form>
  </div>

  <!-- Bottom box -->
  <div class="bottom-box">
    <p>Already have an account?</p>
    <button>Go To Sign In</button>
  </div>

</body>
</html>
