<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link rel="stylesheet" href="signUp.css" />
</head>
<body>

  <!-- Back button -->
  <div class="back-btn" onclick="window.location.href='signIn.html'">&#8592;</div>

  <!-- Title -->
  <h1 class="title">Create Your Account</h1>

  <!-- Form Card -->
  <div class="card">

    <div class="form-row">
      <label>Name: <span class="required">*</span></label>
      <input type="text" id="nameField" placeholder="Your name" />
    </div>

    <div class="form-row">
      <label>Username: <span class="required">*</span></label>
      <input type="text" id="usernameField" placeholder="Choose a username" />
    </div>

    <div class="form-row">
      <label>Email: <span class="required">*</span></label>
      <input type="email" id="emailField" placeholder="you@example.com" />
    </div>

    <div class="form-row">
      <label>Password: <span class="required">*</span></label>
      <input type="password" id="passwordField" placeholder="Password" />
    </div>

    <div class="form-row">
      <label>Re-type password: <span class="required">*</span></label>
      <input type="password" id="confirmPasswordField" placeholder="Re-type password" />
    </div>

    <p class="required-note"><span class="required">*</span> = Required field</p>

    <div class="terms">
      <input type="checkbox" id="termsCheck" />
      <p>I agree to the <span>Terms of Use</span> and <span>Privacy Policy</span>.</p>
    </div>

    <button class="btn" onclick="signUp()">Sign up</button>

  </div>

  <!-- Bottom box -->
  <div class="bottom-box">
    <p>Already have an account?</p>
    <button onclick="window.location.href='signIn.html'">Go To Sign In</button>
  </div>

  <script>
    function signUp() {
      const name = document.getElementById('nameField').value.trim();
      const username = document.getElementById('usernameField').value.trim();
      const email = document.getElementById('emailField').value.trim();
      const password = document.getElementById('passwordField').value;
      const confirmPassword = document.getElementById('confirmPasswordField').value;
      const termsChecked = document.getElementById('termsCheck').checked;

      if (!name) { alert('Please enter your name.'); return; }
      if (!username) { alert('Please choose a username.'); return; }
      if (!email) { alert('Please enter your email.'); return; }
      if (!password) { alert('Please enter a password.'); return; }
      if (password !== confirmPassword) { alert('Passwords do not match.'); return; }
      if (!termsChecked) { alert('Please agree to the Terms of Use and Privacy Policy.'); return; }

      localStorage.setItem('username', username);
      window.location.href = 'home.html';
    }
  </script>

</body>
</html>
