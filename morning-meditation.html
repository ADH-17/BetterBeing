<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning Guided Meditation – BetterBeing</title>
  <link rel="stylesheet" href="meditation.css" />
  <style>
    .player-controls-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }
    .volume-group {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-start;
    }
    .controls-center { display: flex; justify-content: center; }
    .pause-btn {
      width: 48px; height: 48px;
      border: 2px solid #555; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: white;
    }
    .pause-btn svg { width: 22px; height: 22px; }
  </style>
</head>
<body>

  <audio id="audioPlayer" src="meditation_sound_files/Body-Scan-Meditation.mp3" preload="metadata"></audio>

  <div class="container">
    <div class="header">
      <div class="header-left">
        <a href="meditation.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </a>
        <h1 class="page-title">Morning Guided<br>Meditation</h1>
      </div>
      <div class="profile-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="7" r="4"/>
          <path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
    </div>

    <div class="player-card">
      <div class="player-image" style="background: linear-gradient(180deg, #f97316 0%, #fb923c 25%, #fbbf24 55%, #1a1a3e 100%);">
        <div class="img-placeholder">🌄</div>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-bar">
          <div class="progress-fill red" id="progressFill"></div>
          <div class="progress-bar-overlay" id="progressOverlay"></div>
        </div>
        <div class="progress-times">
          <span id="currentTime">0:00</span>
          <span id="remainingTime">--:--</span>
        </div>
      </div>

      <div class="player-controls-row">
        <div class="volume-group">
          <span class="volume-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 010 7.07"/>
              <path d="M19.07 4.93a10 10 0 010 14.14"/>
            </svg>
          </span>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" />
        </div>
        <div class="controls-center">
          <div class="pause-btn" onclick="togglePlay()">
            <svg id="playPauseIcon" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
          </div>
        </div>
        <div></div>
      </div>

      <div class="session-desc-block">
        <p>Start your morning with guided meditation to reduce stress, increase mental clarity, and boost productivity.</p>
        <p class="duration-label">~ 3 minutes</p>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item"><span>📓</span><p>JOURNAL</p></div>
    <div class="nav-item"><span>📈</span><p>PROGRESS</p></div>
    <div class="nav-item"><span>🏠</span><p>HOME</p></div>
    <div class="nav-item"><span>🏋️</span><p>WORKOUT</p></div>
    <a href="meditation.html" class="nav-item active"><span>🧘</span><p>MEDITATION</p></a>
  </nav>

  <script>
    const audio = document.getElementById('audioPlayer');
    const progressFill = document.getElementById('progressFill');
    const progressOverlay = document.getElementById('progressOverlay');
    const currentTimeEl = document.getElementById('currentTime');
    const remainingTimeEl = document.getElementById('remainingTime');
    const playPauseIcon = document.getElementById('playPauseIcon');
    const volumeSlider = document.getElementById('volumeSlider');

    audio.volume = volumeSlider.value / 100;

    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    function updateDisplay() {
      const duration = audio.duration || 0;
      const current = audio.currentTime;
      currentTimeEl.textContent = formatTime(current);
      remainingTimeEl.textContent = duration ? formatTime(duration - current) : '--:--';
      progressFill.style.width = duration ? (current / duration * 100) + '%' : '0%';
    }

    function showPauseIcon() {
      playPauseIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    }
    function showPlayIcon() {
      playPauseIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
    }
    function togglePlay() {
      if (audio.paused) { audio.play(); showPauseIcon(); }
      else { audio.pause(); showPlayIcon(); }
    }

    audio.addEventListener('timeupdate', updateDisplay);
    audio.addEventListener('seeked', updateDisplay);

    audio.addEventListener('loadedmetadata', () => {
      remainingTimeEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', showPlayIcon);

    progressOverlay.addEventListener('click', (e) => {
      const rect = progressOverlay.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      if (audio.duration) audio.currentTime = pct * audio.duration;
    });

    volumeSlider.addEventListener('input', () => {
      audio.volume = volumeSlider.value / 100;
    });
  </script>

</body>
</html>
