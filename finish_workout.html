<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Workout Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --teal: #5b9fa8;
      --teal-dark: #4a8a93;
      --teal-light: #e8f4f6;
      --bg: #f7f8f9;
      --text: #1a1a1a;
      --muted: #666;
      --border: #dde3e7;
      --white: #ffffff;
      --accent: #e8c547;
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: #c9d4d8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
 
    .phone {
      width: 390px;
      min-height: 780px;
      background: var(--bg);
      border-radius: 44px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.3), inset 0 0 0 2px #aab4bb;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
 
    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }
 
    .status-bar .icons { display: flex; gap: 5px; align-items: center; }
    .status-bar .icons svg { width: 14px; height: 14px; }
 
    /* Profile icon */
    .profile-bar {
      display: flex;
      justify-content: flex-end;
      padding: 4px 20px 0;
    }
 
    .profile-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--teal);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 14px;
    }
 
    /* Scrollable content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 10px 20px 20px;
      scrollbar-width: none;
    }
    .content::-webkit-scrollbar { display: none; }
 
    /* Hero */
    .hero {
      text-align: center;
      padding: 10px 0 18px;
      position: relative;
    }
 
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 2px;
      color: var(--text);
      line-height: 1;
      animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
    }
 
    .confetti {
      position: absolute;
      font-size: 22px;
      animation: float 2s ease-in-out infinite alternate;
    }
    .confetti.left  { left: 12px; top: 16px; }
    .confetti.right { right: 12px; top: 16px; animation-delay: 0.4s; }
 
    /* Stats banner */
    .stats-banner {
      background: var(--teal);
      border-radius: 12px;
      padding: 14px 16px;
      color: white;
      font-size: 13.5px;
      line-height: 1.7;
      margin-bottom: 22px;
      animation: slideUp 0.4s 0.1s ease both;
    }
    .stats-banner strong { font-weight: 700; }
 
    /* Section title */
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      color: var(--text);
      margin-bottom: 12px;
    }
 
    /* Record cards */
    .record-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.4s ease both;
    }
    .record-card:nth-child(2) { animation-delay: 0.05s; }
    .record-card:nth-child(3) { animation-delay: 0.1s; }
 
    .record-badge {
      background: var(--teal-light);
      color: var(--teal-dark);
      font-size: 20px;
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
 
    .record-text { flex: 1; }
    .record-text .name { font-weight: 700; font-size: 14px; color: var(--text); }
    .record-text .weight {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--teal-dark);
      letter-spacing: 1px;
    }
 
    .new-badge {
      background: var(--accent);
      color: #1a1a1a;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
 
    /* Goals section */
    .goals-section {
      margin-top: 20px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      animation: slideUp 0.4s 0.15s ease both;
    }
 
    .goals-section .section-title { margin-bottom: 10px; }
 
    .goal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
 
    .goal-label { font-size: 13px; color: var(--muted); font-weight: 500; }
    .goal-value { font-size: 14px; font-weight: 700; color: var(--text); }
 
    .progress-bar-wrap {
      background: var(--teal-light);
      border-radius: 99px;
      height: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), #7ec8d0);
      border-radius: 99px;
      width: 87.8%;
      transition: width 1s ease;
    }
 
    .goal-cta {
      font-size: 12px;
      font-weight: 700;
      color: var(--teal-dark);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
 
    /* CTA button */
    .cta-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      animation: slideUp 0.4s 0.2s ease both;
    }
    .cta-btn:hover  { background: var(--teal-dark); }
    .cta-btn:active { transform: scale(0.98); }
 
    /* Bottom nav */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 18px;
      border-top: 1px solid var(--border);
      background: var(--white);
    }
 
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s;
    }
    .nav-item:hover { opacity: 1; }
    .nav-item.active { opacity: 1; color: var(--teal); }
 
    .nav-item svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
 
    /* Animations */
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes float {
      from { transform: translateY(0) rotate(-5deg); }
      to   { transform: translateY(-6px) rotate(5deg); }
    }
  </style>
</head>
<body>
<div class="phone">
 
  <!-- Status bar -->
  <div class="status-bar">
    <span>9:52 AM</span>
    <div class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6l5.5 5.5L12 6l5.5 5.5L23 6"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="6" width="3" height="12" rx="1"/><rect x="6" y="4" width="3" height="14" rx="1"/><rect x="11" y="2" width="3" height="16" rx="1"/><rect x="16" y="1" width="3" height="17" rx="1"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7A9 9 0 0 0 1 7"/><path d="M17 11a5 5 0 0 0-10 0"/><circle cx="12" cy="15" r="1" fill="currentColor"/></svg>
    </div>
  </div>
 
  <!-- Profile -->
  <div class="profile-bar">
    <div class="profile-icon">JD</div>
  </div>
 
  <!-- Scrollable content -->
  <div class="content">
 
    <div class="hero">
      <span class="confetti left">🎉</span>
      <h1>Great Job!!</h1>
      <span class="confetti right">🎊</span>
    </div>
 
    <div class="stats-banner">
      <div><strong>Stats for this workout:</strong></div>
      <div>Total Volume: <strong>2,000 lbs</strong></div>
      <div>Highest rep: <strong>150 lbs</strong></div>
    </div>
 
    <div class="section-title">Lift Records!!</div>
 
    <div class="record-card">
      <div class="record-badge">🏋️</div>
      <div class="record-text">
        <div class="name">Squat</div>
        <div class="weight">145 lbs</div>
      </div>
      <span class="new-badge">New Record!</span>
    </div>
 
    <div class="record-card">
      <div class="record-badge">🦵</div>
      <div class="record-text">
        <div class="name">Leg Press</div>
        <div class="weight">200 lbs</div>
      </div>
      <span class="new-badge">New Record!</span>
    </div>
 
    <div class="goals-section">
      <div class="section-title">Goals</div>
 
      <div class="goal-row">
        <span class="goal-label">Squat — Current</span>
        <span class="goal-value">145 lbs</span>
      </div>
      <div class="goal-row">
        <span class="goal-label">Target</span>
        <span class="goal-value">165 lbs</span>
      </div>
 
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill"></div>
      </div>
 
      <div class="goal-cta">🔥 Only 20 more lbs to go!</div>
    </div>
 
    <button class="cta-btn">Onwards!!</button>
 
  </div>
 
  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M4 19V9l8-6 8 6v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/><path d="M9 19v-6h6v6"/></svg>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M6.5 6.5a6 6 0 1 0 8.485 8.485A6 6 0 0 0 6.5 6.5z"/><path d="M20 20l-4-4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span class="nav-label">Workout</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      <span class="nav-label">Journal</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span class="nav-label">Goals</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
      <span class="nav-label">Meditation</span>
    </div>
  </nav>
 
</div>
</body>
</html>
