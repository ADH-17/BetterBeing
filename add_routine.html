<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Add Routine</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f3ef;
  --teal: #5a9fa8;
  --purple: #4a3f9f;
  --purple-dark: #3a2f8f;
  --red: #d94040;
  --text: #1a1a1a;
}

/* Prevent sideways scroll */
html, body { overflow-x: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.phone {
  width: 375px;
  height: 780px;
  border-radius: 40px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  box-shadow: 0 30px 80px rgba(0,0,0,0.18);
}

/* Header */
.header {
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.back-btn {
  font-size: 24px;
  cursor: pointer;
}

.header h1 {
  font-family: 'Bebas Neue';
  font-size: 28px;
}

/* Content */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 10px 20px;
}

/* Exercise Card */
.exercise-card {
  background: var(--teal);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}

.exercise-name {
  color: white;
  font-weight: 600;
  margin-bottom: 10px;
}

/* Sets */
.set-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}

.set-number {
  color: white;
  font-weight: bold;
  width: 20px;
}

.set-input {
  flex: 1;
  min-width: 0;
  padding: 8px;
  border-radius: 8px;
  border: none;
  text-align: center;
}

.delete-btn {
  width: 32px;
  height: 32px;
  background: var(--red);
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* Buttons */
.add-rep-btn {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  background: var(--purple);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.add-exercise-btn {
  width: 100%;
  padding: 12px;
  border: 2px solid var(--purple);
  background: transparent;
  color: var(--purple);
  border-radius: 12px;
  margin-bottom: 10px;
}

/* Save area */
.save-area {
  padding: 10px 20px;
}

.save-btn {
  width: 100%;
  padding: 14px;
  background: var(--purple);
  border: none;
  border-radius: 14px;
  color: white;
  font-weight: 700;
  cursor: pointer;
}

/* Bottom Nav */
.bottom-nav {
  display: flex;
  justify-content: space-around;
  padding: 10px 0 14px;
  background: white;
  border-top: 1px solid #eee;
}

.nav-item {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 10px;
  cursor: pointer;
  opacity: 0.6;
}

.nav-item.active {
  opacity: 1;
}
</style>

</head>

<body>

<div class="phone">

  <div class="header">
    <span class="back-btn" onclick="goBack()">←</span>
    <h1>Add Routine</h1>
    <span>👤</span>
  </div>

  <div class="content" id="exercise-list"></div>

  <div style="padding: 0 20px;">
    <button class="add-exercise-btn" onclick="addExercise()">Add Exercise</button>
  </div>

  <div class="save-area">
    <button class="save-btn" onclick="saveRoutine()">Save Routine</button>
  </div>

  <div class="bottom-nav">
    <button class="nav-item" id="nav-journal">Journal</button>
    <button class="nav-item" id="nav-goals">Goals</button>
    <button class="nav-item" id="nav-home">Home</button>
    <button class="nav-item active" id="nav-workout">Workout</button>
    <button class="nav-item" id="nav-meditation">Meditation</button>
  </div>

</div>

<script>
// Back button
function goBack() {
  window.location.href = "workout.html";
}

// Navigation
const routes = {
  "nav-journal": "journal.html",
  "nav-goals": "goals.html",
  "nav-home": "home.html",
  "nav-workout": "workout.html",
  "nav-meditation": "meditation.html"
};

document.addEventListener("DOMContentLoaded", () => {
  Object.keys(routes).forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.onclick = () => window.location.href = routes[id];
  });
});

// Save Routine (basic placeholder)
function saveRoutine() {
  alert("Routine Saved (you’ll want to store this later)");
}

// Exercise logic
let exerciseCount = 0;

function addExercise() {
  exerciseCount++;

  const card = document.createElement("div");
  card.className = "exercise-card";

  card.innerHTML = `
    <div class="exercise-name">Exercise ${exerciseCount}</div>
    <div class="sets"></div>
    <button class="add-rep-btn">+ Add Rep</button>
  `;

  document.getElementById("exercise-list").appendChild(card);

  const sets = card.querySelector(".sets");

  addSet(sets);

  card.querySelector(".add-rep-btn").onclick = () => addSet(sets);
}

function addSet(container) {
  const num = container.children.length + 1;

  const row = document.createElement("div");
  row.className = "set-row";

  row.innerHTML = `
    <span class="set-number">${num}.</span>
    <input class="set-input" placeholder="Weight">
    <input class="set-input" placeholder="Reps">
    <button class="delete-btn">✕</button>
  `;

  row.querySelector(".delete-btn").onclick = () => {
    if (container.children.length > 1) {
      row.remove();
      renumber(container);
    }
  };

  container.appendChild(row);
}

function renumber(container) {
  [...container.children].forEach((row, i) => {
    row.querySelector(".set-number").textContent = (i + 1) + ".";
  });
}

// Start with one exercise
addExercise();
</script>

</body>
</html>
