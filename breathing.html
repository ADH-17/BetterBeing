<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathing Exercise – BetterBeing</title>
  <link rel="stylesheet" href="meditation.css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <a href="meditation.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </a>
        <h1 class="page-title">Breathing<br>Exercise</h1>
      </div>
      <div class="profile-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="7" r="4"/>
          <path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
    </div>

    <!-- Player Card -->
    <div class="player-card">

      <!-- Image placeholder (waterfall / nature) -->
      <div class="player-image" style="background: linear-gradient(160deg, #4a7c59 0%, #6aab7a 40%, #a8d5a2 70%, #c8e6c9 100%);">
        <div class="img-placeholder">🌊</div>
      </div>

      <!-- Progress bar -->
      <div class="progress-bar-wrap">
        <div class="progress-bar">
          <div class="progress-fill green"></div>
        </div>
        <div class="progress-times">
          <span>0:00</span>
          <span>2:28</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <span class="volume-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 010 7.07"/>
            <path d="M19.07 4.93a10 10 0 010 14.14"/>
          </svg>
        </span>
        <input type="range" class="volume-slider" min="0" max="100" value="60" />
        <div class="pause-btn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </div>
      </div>

      <!-- Description -->
      <div class="session-desc-block">
        <p>Focus on your breathing to help you feel calm and centered.</p>
        <p class="duration-label">~ 3 minutes</p>
      </div>

    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-item">
      <span>📓</span>
      <p>JOURNAL</p>
    </div>
    <div class="nav-item">
      <span>📈</span>
      <p>PROGRESS</p>
    </div>
    <div class="nav-item">
      <span>🏠</span>
      <p>HOME</p>
    </div>
    <div class="nav-item">
      <span>🏋️</span>
      <p>WORKOUT</p>
    </div>
    <a href="meditation.html" class="nav-item active">
      <span>🧘</span>
      <p>MEDITATION</p>
    </a>
  </nav>

</body>
</html>
