<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BetterBeing</title>
  <link rel="stylesheet" href="signIn.css" />
</head>
<body>

  <div class="background"></div>

  <div class="card">
    <h1>Sign In</h1>
    <input type="text" id="usernameField" placeholder="Username" />
    <input type="password" id="passwordField" placeholder="Password" />
    <label class="show-password">
      <input type="checkbox" id="showPassword" onchange="togglePassword()" />
      Show Password
    </label>
    <button class="btn" onclick="signIn()">Sign In</button>
  </div>

  <script>
    function togglePassword() {
      const field = document.getElementById('passwordField');
      field.type = document.getElementById('showPassword').checked ? 'text' : 'password';
    }

    function signIn() {
      const username = document.getElementById('usernameField').value.trim();
      if (username) {
        localStorage.setItem('username', username);
      }
      window.location.href = 'home.html';
    }
  </script>

</body>
</html>
